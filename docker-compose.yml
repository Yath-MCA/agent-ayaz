# AyazGitDy - Docker Compose for Dev Team
# Simplified testing with Docker
# Ollama runs as a sidecar container — no local Ollama needed

version: '3.8'

services:

  # ── Ollama (Local LLM) ───────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ayazdy-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - ayazdy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Pull default model after Ollama starts ───────────────────
  ollama-pull:
    image: ollama/ollama:latest
    container_name: ayazdy-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: >
      sh -c "OLLAMA_HOST=http://ollama:11434 ollama pull ${OLLAMA_MODEL:-mistral} && echo 'Model ready'"
    environment:
      - OLLAMA_HOST=http://ollama:11434
    networks:
      - ayazdy-network
    restart: "no"

  # ── Agent API ────────────────────────────────────────────────
  ayazdy:
    build: .
    container_name: ayazdy-agent
    ports:
      - "9234:9234"
    environment:
      - PROJECT_ROOT=/app/projects
      - HOST=0.0.0.0
      - PORT=9234
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
    env_file:
      - .env
    volumes:
      - ./projects:/app/projects
      - ./logs:/app/logs
      - ./agent-task:/app/agent-task
    restart: unless-stopped
    networks:
      - ayazdy-network
    depends_on:
      ollama:
        condition: service_healthy

networks:
  ayazdy-network:
    driver: bridge

volumes:
  ollama_data:
    driver: local
