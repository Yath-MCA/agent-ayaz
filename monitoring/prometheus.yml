# Prometheus Configuration for AyazDy Task Queue System

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'ayazdy-monitor'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files: []

# Scrape configurations
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'queue-api'
    static_configs:
      - targets: ['queue-api:9234']
    scrape_interval: 10s

  - job_name: 'dashboard'
    static_configs:
      - targets: ['dashboard:9890']
    scrape_interval: 10s

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:3000']
    scrape_interval: 30s
